version: '3.8'

services:

  # consul:
  #   image: hashicorp/consul
  #   container_name: consul
  #   command: agent -dev -client=0.0.0.0
  #   ports:
  #     - "8500:8500"
  #   networks:
  #     - college-network

  mysql:
    image: mysql:8
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: Avimal@2710
      MYSQL_DATABASE: scollege_db
    ports:
      - "3307:3306" # Maps to 3307 on your host because 3306 is taken by local MySQL
    networks:
      - college-network
    volumes:
      - mysql-data:/var/lib/mysql

  college-CURD:
    build:
      # Updated path to match your folder structure
      context: ./College_Management/College_Management
      dockerfile: Dockerfile
    container_name: college-CURD
    ports:
      - "8001:9001"
    depends_on:
      - mysql
      # - consul
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/scollege_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Avimal@2710
      # SPRING_CLOUD_CONSUL_HOST: consul
      # SPRING_CLOUD_CONSUL_PORT: 8500
    networks:
      - college-network

networks:
  college-network:

volumes:
  mysql-data: